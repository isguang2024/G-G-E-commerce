# G&G E-commerce Backend Configuration

env: development

server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30
  write_timeout: 30

db:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "gg_ecommerce"
  sslmode: "disable"
  timezone: "Asia/Shanghai"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

elasticsearch:
  addresses:
    - "http://localhost:9200"
  username: ""
  password: ""

minio:
  endpoint: "localhost:9000"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  use_ssl: false
  bucket_name: "gg-ecommerce"

jwt:
  secret: "your-secret-key-change-in-production"  # 生产环境请修改为强随机字符串
  access_expire: 10080   # 7天，单位：分钟
  refresh_expire: 10080  # 7天，单位：分钟

log:
  level: "info"
  output: "stdout"
