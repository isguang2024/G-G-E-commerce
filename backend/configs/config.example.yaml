# G&G E-commerce Backend Configuration

env: development

server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30
  write_timeout: 30

db:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "gg_ecommerce"
  sslmode: "disable"
  timezone: "Asia/Shanghai"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

elasticsearch:
  addresses:
    - "http://localhost:9200"
  username: ""
  password: ""

minio:
  endpoint: "localhost:9000"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  use_ssl: false
  bucket_name: "gg-ecommerce"

jwt:
  secret: "your-secret-key-change-in-production"  # 生产环境请修改为强随机字符串
  access_expire: 10080   # 7天，单位：分钟
  refresh_expire: 10080  # 7天，单位：分钟

log:
  level: "info"
  output: "stdout"      # stdout | "/var/log/gge/app.log"
  format: "json"        # json | console；生产环境固定 json
  sampling:
    initial: 100        # 每个日志级别 + message 的前 N 条全放行
    thereafter: 10      # 之后每 N 条采样 1 条；0 表示关闭采样

audit:
  enabled: true
  async: true            # true=channel+worker；false=同步写，调试/低流量可用
  queue_size: 1024       # 异步 channel 缓冲容量；满了按 drop-newest 策略
  workers: 2             # 异步消费 goroutine 数量
  batch_size: 100        # 到达该条数立即批量刷盘
  flush_interval_seconds: 1 # 未达到 batch_size 时，最长等待秒数
  degraded_file: "./data/audit_degraded.jsonl" # 断路器打开后降级写入的 JSONL 文件
  redact_fields:         # 顶层默认脱敏字段之外的项目私有字段
    - "x_custom_secret"

telemetry:
  ingest_enabled: true
  max_batch_size: 100    # 单次 POST /telemetry/logs 最多条数
  session_rate_limit: 60 # 单 session 每秒允许写入条数
  ip_rate_limit: 600     # 单客户端 IP 每秒允许写入条数
  payload_max_bytes: 8192
