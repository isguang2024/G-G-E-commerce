openapi: 3.0.3
info:
  title: GG E-commerce API
  version: 5.0.0
  description: |
    GGE 5.0 API contract. OpenAPI-first: this spec is the single source of truth.
    Go server code, TS client, permission_keys and api_endpoints are derived from here.

servers:
  - url: /api/v1

paths:
  /workspaces/{id}:
    get:
      operationId: getWorkspace
      summary: 获取工作空间详情
      tags: [workspace]
      x-permission-key: workspace.read
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSummary'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    WorkspaceSummary:
      type: object
      required: [id, workspace_type, name, code, status]
      properties:
        id:
          type: string
          format: uuid
        workspace_type:
          type: string
          enum: [personal, collaboration]
        name:
          type: string
        code:
          type: string
        owner_user_id:
          type: string
          format: uuid
          nullable: true
        collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
