          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: roleName
          in: query
          schema:
            type: string
        - name: roleCode
          in: query
          schema:
            type: string
        - name: appKey
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
