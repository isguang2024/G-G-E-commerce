            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'

  /permissions/explain:
    get:
      operationId: explainPermissions
      summary: 解释当前账号在指定工作空间内的最终权限及其来源
      tags: [permission]
      x-permission-key: permission.explain
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionExplanation'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

