          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAssignRolesRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResult'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/collaboration-workspaces:
    get:
      operationId: getUserCollaborationWorkspaces
      summary: 获取用户所在协作空间列表
      tags: [user]
      x-permission-key: system.user.manage
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyObject'

  /users/{id}/packages:
    get:
      operationId: getUserPackages
      summary: 获取用户功能包
      tags: [user]
      x-permission-key: feature_package.assign_collaboration_workspace
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: app_key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPackagesResponse'
    put:
      operationId: setUserPackages
      summary: 配置用户功能包
      tags: [user]
      x-permission-key: feature_package.assign_collaboration_workspace
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UUIDListRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'

  /users/{id}/menus:
    get:
      operationId: getUserMenus
      summary: 获取用户菜单裁剪
      tags: [user]
      x-permission-key: system.user.manage
      x-tenant-scoped: true
      x-app-scope: optional
