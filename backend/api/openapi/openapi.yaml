          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'

  /roles/{id}/menus:
    get:
      operationId: getRoleMenus
      summary: 获取角色菜单权限
      tags: [role]
      x-permission-key: system.role.assign_menu
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: app_key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
