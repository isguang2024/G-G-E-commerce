              schema:
                $ref: '#/components/schemas/MutationResult'

  /roles/{id}/packages:
    get:
      operationId: getRolePackages
      summary: 获取角色功能包
      tags: [role]
      x-permission-key: feature_package.assign_collaboration_workspace
      x-tenant-scoped: true
      x-app-scope: optional
