openapi: 3.0.3
info:
  title: GG E-commerce API
  version: 5.0.0
  description: |
    GGE 5.0 API contract. OpenAPI-first: this spec is the single source of truth.
    Go server code, TS client, permission_keys and api_endpoints are derived from here.

servers:
  - url: /api/v1

paths:
  /auth/login:
    post:
      operationId: login
      summary: 用户登录
      tags: [auth]
      x-tenant-scoped: false
      x-app-scope: none
      x-access-mode: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register:
    post:
      operationId: register
      summary: 用户注册
      tags: [auth]
      x-tenant-scoped: false
      x-app-scope: none
      x-access-mode: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: 刷新访问令牌
      tags: [auth]
      x-tenant-scoped: false
      x-app-scope: none
      x-access-mode: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      operationId: getAuthMe
      summary: 获取当前登录账户信息
      tags: [auth]
      x-tenant-scoped: false
      x-app-scope: none
      x-access-mode: authenticated
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMe'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workspaces/my:
    get:
      operationId: listMyWorkspaces
      summary: 获取我的工作空间列表
      tags: [workspace]
      x-permission-key: workspace.list
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workspaces/current:
    get:
      operationId: getCurrentWorkspace
      summary: 获取当前授权工作空间
      tags: [workspace]
      x-permission-key: workspace.read
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workspaces/switch:
    post:
      operationId: switchWorkspace
      summary: 切换当前授权工作空间
      tags: [workspace]
      x-permission-key: workspace.switch
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceSwitchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSwitchResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      summary: 获取工作空间详情
      tags: [workspace]
      x-permission-key: workspace.read
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSummary'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /permissions/explain:
    get:
      operationId: explainPermissions
      summary: 解释当前账号在指定工作空间内的最终权限及其来源
      tags: [permission]
      x-permission-key: permission.explain
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionExplanation'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    WorkspaceSummary:
      type: object
      required: [id, workspace_type, name, code, status]
      properties:
        id:
          type: string
          format: uuid
        workspace_type:
          type: string
          enum: [personal, collaboration]
        name:
          type: string
        code:
          type: string
        owner_user_id:
          type: string
          format: uuid
          nullable: true
        collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
    WorkspaceList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceSummary'
        total:
          type: integer
    PermissionExplanation:
      type: object
      required: [account_id, workspace_id, keys]
      properties:
        account_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        keys:
          type: array
          items:
            type: string
        feature_package_sources:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              format: uuid
        role_sources:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              format: uuid
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 6
    LoginResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          type: object
          additionalProperties: true
          nullable: true
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 6
        email:
          type: string
        nickname:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    TokenResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    AuthMe:
      type: object
      required: [id, username, is_super_admin, actions, roles]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        nickname:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        is_super_admin:
          type: boolean
        created_at:
          type: string
          nullable: true
        current_auth_workspace_id:
          type: string
          format: uuid
          nullable: true
        current_auth_workspace_type:
          type: string
          nullable: true
        collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        current_collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        actions:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AuthMeRole'
    AuthMeRole:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
    WorkspaceSwitchRequest:
      type: object
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          format: uuid
    WorkspaceSwitchResponse:
      type: object
      required: [auth_workspace_id, auth_workspace_type, workspace]
      properties:
        auth_workspace_id:
          type: string
          format: uuid
        auth_workspace_type:
          type: string
          enum: [personal, collaboration]
        collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        workspace:
          $ref: '#/components/schemas/WorkspaceSummary'
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
