components:
  schemas:
    # ─── Workspace ──────────────────────────────────────────────────────────────
    WorkspaceSummary:
      type: object
      required: [id, workspace_type, name, code, status]
      properties:
        id:
          type: string
          format: uuid
        workspace_type:
          type: string
          enum: [personal, collaboration]
        name:
          type: string
        code:
          type: string
        owner_user_id:
          type: string
          format: uuid
          nullable: true
        collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
    WorkspaceList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceSummary'
        total:
          type: integer
    PermissionExplanation:
      type: object
      required: [account_id, workspace_id, keys]
      properties:
        account_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        keys:
          type: array
          items:
            type: string
        feature_package_sources:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              format: uuid
        role_sources:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              format: uuid

    # ─── Auth ───────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 6
    LoginResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          type: object
          additionalProperties: {}
          nullable: true
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 6
        email:
          type: string
        nickname:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    TokenResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    AuthMe:
      type: object
      required: [id, username, is_super_admin, actions, roles]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        nickname:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        is_super_admin:
          type: boolean
        created_at:
          type: string
          nullable: true
        current_auth_workspace_id:
          type: string
          format: uuid
          nullable: true
        current_auth_workspace_type:
          type: string
          nullable: true
        collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        current_collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        actions:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AuthMeRole'
    AuthMeRole:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
    WorkspaceSwitchRequest:
      type: object
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          format: uuid
    WorkspaceSwitchResponse:
      type: object
      required: [auth_workspace_id, auth_workspace_type, workspace]
      properties:
        auth_workspace_id:
          type: string
          format: uuid
        auth_workspace_type:
          type: string
          enum: [personal, collaboration]
        collaboration_workspace_id:
          type: string
          format: uuid
          nullable: true
        workspace:
          $ref: '#/components/schemas/WorkspaceSummary'

    # ─── User ───────────────────────────────────────────────────────────────────
    UserRoleRef:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
    UserSummary:
      type: object
      required: [id, user_name, status, create_time, update_time, user_roles, role_details]
      properties:
        id:
          type: string
          format: uuid
        user_name:
          type: string
        user_email:
          type: string
          nullable: true
        nick_name:
          type: string
          nullable: true
        user_phone:
          type: string
          nullable: true
        system_remark:
          type: string
          nullable: true
        last_login_time:
          type: string
          nullable: true
        last_login_ip:
          type: string
          nullable: true
        status:
          type: string
        avatar:
          type: string
          nullable: true
        create_time:
          type: string
        update_time:
          type: string
        user_roles:
          type: array
          items:
            type: string
        role_details:
          type: array
          items:
            $ref: '#/components/schemas/UserRoleRef'
        register_source:
          type: string
          nullable: true
        invited_by:
          type: string
          format: uuid
          nullable: true
        invited_by_name:
          type: string
          nullable: true
    UserList:
      type: object
      required: [records, total, current, size]
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
        total:
          type: integer
          format: int64
        current:
          type: integer
        size:
          type: integer
    UserDetail:
      type: object
      required: [id, user_name, status, create_time, update_time, roles, user_roles, role_details]
      properties:
        id:
          type: string
          format: uuid
        user_name:
          type: string
        user_email:
          type: string
          nullable: true
        nick_name:
          type: string
          nullable: true
        user_phone:
          type: string
          nullable: true
        system_remark:
          type: string
          nullable: true
        last_login_time:
          type: string
