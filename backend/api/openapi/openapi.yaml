      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: app_key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyObject'
    put:
      operationId: setUserMenus
      summary: 配置用户菜单裁剪
      tags: [user]
      x-permission-key: system.user.manage
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnyObject'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'

  /users/{id}/permissions:
    get:
      operationId: getUserPermissions
      summary: 获取用户菜单权限
      tags: [user]
      x-permission-key: system.user.manage
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: app_key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyObject'

  /users/{id}/permission-diagnosis:
    get:
      operationId: getUserPermissionDiagnosis
      summary: 获取用户权限诊断
      tags: [user]
      x-permission-key: system.user.manage
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: app_key
          in: query
          schema:
            type: string
        - name: permission_key
          in: query
          schema:
            type: string
        - name: collaboration_workspace_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyObject'

  /users/{id}/permission-refresh:
    post:
      operationId: refreshUserPermissionSnapshot
      summary: 刷新用户权限快照
      tags: [user]
      x-permission-key: system.user.manage
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
