openapi: 3.0.3
info:
  title: GG E-commerce API
  version: 5.0.0
  description: |
    GGE 5.0 API contract. OpenAPI-first: this spec is the single source of truth.
    Go server code, TS client, permission_keys and api_endpoints are derived from here.

servers:
  - url: /api/v1

paths:
  /auth/login:
    post:
      operationId: login
      summary: 用户登录
      tags: [auth]
      x-tenant-scoped: false
      x-app-scope: none
      x-access-mode: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register:
    post:
      operationId: register
      summary: 用户注册
      tags: [auth]
      x-tenant-scoped: false
      x-app-scope: none
      x-access-mode: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: 刷新访问令牌
      tags: [auth]
      x-tenant-scoped: false
      x-app-scope: none
      x-access-mode: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      operationId: getAuthMe
      summary: 获取当前登录账户信息
      tags: [auth]
      x-tenant-scoped: false
      x-app-scope: none
      x-access-mode: authenticated
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMe'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workspaces/my:
    get:
      operationId: listMyWorkspaces
      summary: 获取我的工作空间列表
      tags: [workspace]
      x-permission-key: workspace.list
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workspaces/current:
    get:
      operationId: getCurrentWorkspace
      summary: 获取当前授权工作空间
      tags: [workspace]
      x-permission-key: workspace.read
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workspaces/switch:
    post:
      operationId: switchWorkspace
      summary: 切换当前授权工作空间
      tags: [workspace]
      x-permission-key: workspace.switch
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceSwitchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSwitchResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      summary: 获取工作空间详情
      tags: [workspace]
      x-permission-key: workspace.read
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSummary'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    post:
      operationId: createUser
      summary: 创建用户
      tags: [user]
      x-permission-key: user.create
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResult'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: listUsers
      summary: 获取用户列表（分页 + 多条件筛选）
      tags: [user]
      x-permission-key: user.list
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: current
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: user_name
          in: query
          required: false
          schema:
            type: string
        - name: user_email
          in: query
          required: false
          schema:
            type: string
        - name: user_phone
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: role_id
          in: query
          required: false
          schema:
            type: string
        - name: register_source
          in: query
          required: false
          schema:
            type: string
        - name: invited_by
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    get:
      operationId: getUser
      summary: 获取用户详情
      tags: [user]
      x-permission-key: user.read
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: updateUser
      summary: 更新用户
      tags: [user]
      x-permission-key: user.update
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResult'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteUser
      summary: 删除用户
      tags: [user]
      x-permission-key: user.delete
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResult'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/roles:
    post:
      operationId: assignUserRoles
      summary: 分配用户角色
      tags: [user]
      x-permission-key: user.assign_role
      x-tenant-scoped: true
      x-app-scope: optional
