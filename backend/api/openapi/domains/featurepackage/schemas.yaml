# domains/featurepackage/schemas.yaml
# Domain-specific schemas (currently kept in components/common.yaml).
# Move schemas here incrementally when they belong exclusively to this domain.
components:
  schemas:
    FeaturePackageSnapshot:
      type: object
      additionalProperties: false
      required:
        - package_id
        - package_key
        - package_type
        - name
        - description
        - workspace_scope
        - context_type
        - app_keys
        - status
        - sort_order
        - child_package_ids
        - action_ids
        - menu_ids
        - collaboration_workspace_ids
        - snapshot_created_at
      properties:
        package_id: {type: string, format: uuid}
        package_key: {type: string}
        package_type: {type: string}
        name: {type: string}
        description: {type: string}
        workspace_scope: {type: string}
        context_type: {type: string}
        app_keys:
          type: array
          items: {type: string}
        status: {type: string}
        sort_order: {type: integer}
        child_package_ids:
          type: array
          items: {type: string, format: uuid}
        action_ids:
          type: array
          items: {type: string, format: uuid}
        menu_ids:
          type: array
          items: {type: string, format: uuid}
        collaboration_workspace_ids:
          type: array
          items: {type: string, format: uuid}
        snapshot_created_at: {type: string, format: date-time}
    FeaturePackageCollaborationWorkspaceItem:
      type: object
      required: [id]
      properties:
        id: {type: string, format: uuid}
    FeaturePackageCollaborationWorkspaceList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/FeaturePackageCollaborationWorkspaceItem'}
        total: {type: integer, format: int64}
    FeaturePackageVersionItem:
      type: object
      required:
        - id
        - package_id
        - version_no
        - change_type
        - snapshot
        - request_id
        - created_at
      properties:
        id: {type: string, format: uuid}
        package_id: {type: string, format: uuid}
        version_no: {type: integer}
        change_type: {type: string}
        snapshot:
          $ref: '#/components/schemas/FeaturePackageSnapshot'
        operator_id: {type: string, format: uuid, nullable: true}
        request_id: {type: string}
        created_at: {type: string, format: date-time}
    FeaturePackageVersionList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/FeaturePackageVersionItem'}
        total: {type: integer, format: int64}
    FeaturePackageRiskAuditList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '../../domains/permission/schemas.yaml#/components/schemas/RiskAuditItem'}
        total: {type: integer, format: int64}
