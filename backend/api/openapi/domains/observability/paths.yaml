  /observability/trace/{request_id}:
    get:
      operationId: getObservabilityTrace
      summary: 按 request_id 拉取审计 + 遥测全链路
      description: |-
        给定一次 request_id，同时返回该请求关联的 audit_logs 与 telemetry_logs
        条目（按 ts asc 排序）。用于详情抽屉「跳到这条请求的整条轨迹」按钮。
        权限按 audit.read 控制；调用方对 telemetry.read 没有权限时，结果中
        telemetry_logs 仍会返回（属于审计的从属信息），不另外要求二次授权。
      tags:
      - observability
      x-permission-key: observability.log.read
      x-access-mode: permission
      x-tenant-scoped: true
      x-app-scope: optional
      parameters:
      - name: request_id
        in: path
        required: true
        schema:
          type: string
      responses:
