      tags:
      - observability
      x-permission-key: observability.log.read
      x-access-mode: permission
      x-tenant-scoped: true
      x-app-scope: optional
      parameters:
      - name: current
        in: query
        schema:
          type: integer
      - name: size
        in: query
        schema:
          type: integer
      - name: level
        in: query
        schema:
          type: string
      - name: event
        in: query
        schema:
          type: string
      - name: session_id
        in: query
        schema:
          type: string
      - name: actor_id
        in: query
        schema:
          type: string
      - name: request_id
        in: query
        schema:
          type: string
      - name: from
        in: query
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/TelemetryLogList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /observability/telemetry-logs/{id}:
    get:
      operationId: getTelemetryLog
      summary: 遥测日志详情
      description: 返回单条 telemetry_logs 行，含完整 payload JSON。
      tags:
      - observability
      x-permission-key: observability.log.read
      x-access-mode: permission
      x-tenant-scoped: true
      x-app-scope: optional
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/TelemetryLogDetail'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /observability/metrics:
    get:
      operationId: getObservabilityMetrics
      summary: 观察性子系统运行时指标
      description: |-
        返回当前进程内 audit.Recorder 与 telemetry.Ingester 的队列深度、累计
        accepted / dropped 计数。供 dashboard widget、/healthz 增强、SRE
        仪表盘读取。基础设施指标，不按 tenant 分桶；请求仍需认证，复用
        `observability.audit.read` 权限（能看审计的人能看队列健康）。

        语义注意：
        - `queue_depth` 是 len(chan)，瞬时弱一致，允许与 accepted/dropped 微量错位；
        - `accepted_total` / `dropped_total` 单调递增，进程重启归零；
        - Noop 实现（audit/telemetry 关闭或 DB 为 nil）下，所有字段返回 0。
      tags:
      - observability
      x-permission-key: observability.log.read
      x-access-mode: permission
      x-tenant-scoped: true
      x-app-scope: none
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/ObservabilityMetrics'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /observability/metrics/prometheus:
    get:
      operationId: getObservabilityMetricsPrometheus
      summary: 观察性指标的 Prometheus / openmetrics 文本导出
      description: |-
        以 openmetrics-text v1.0.0 格式返回 audit.Recorder 的四项指标，供
        Prometheus / Alertmanager 等常规监控系统直接 scrape。数据内容与
        `GET /observability/metrics` 一致，差异仅在呈现格式。

        字段映射：
        - `audit_queue_depth` (gauge) — 瞬时队列深度 len(chan)；
        - `audit_queue_capacity` (gauge) — 队列容量 cap(chan)；
        - `audit_events_accepted_total` (counter) — 入队累计；
        - `audit_events_dropped_total` (counter) — 丢弃累计（drop-newest）。

        Noop 模式下所有指标为 0，抓取返回仍然是 200 + 完整样本，便于在告警中
        区分「暂未启用」与「启用后异常」。
      tags:
      - observability
      x-permission-key: observability.log.read
      x-access-mode: permission
      x-tenant-scoped: true
      x-app-scope: none
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: |-
                  # HELP audit_queue_depth audit recorder queue length (len(chan))
                  # TYPE audit_queue_depth gauge
                  audit_queue_depth 0
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /observability/log-policies:
    get:
      operationId: listLogPolicies
      summary: 查询日志策略
      description: 分页查询当前租户下的日志策略，可按 pipeline 与 enabled 过滤。
      tags:
      - observability
      x-permission-key: observability.policy.manage
      x-access-mode: permission
      x-tenant-scoped: true
      x-app-scope: none
      parameters:
      - name: current
        in: query
        schema:
          type: integer
      - name: size
        in: query
        schema:
          type: integer
      - name: pipeline
        in: query
        schema:
          type: string
          enum: [audit, telemetry]
      - name: enabled
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/LogPolicyList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
    post:
      operationId: createLogPolicy
      summary: 创建日志策略
      tags:
      - observability
      x-permission-key: observability.policy.manage
      x-access-mode: permission
      x-tenant-scoped: true
      x-app-scope: none
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/LogPolicyCreateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/LogPolicyItem'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
