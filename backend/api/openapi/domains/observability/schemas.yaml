# domains/observability/schemas.yaml
# 审计 + 遥测日志查询响应结构。字段命名与 logging-spec.md §6 表结构对齐（snake_case）。
components:
  schemas:
    AuditLogItem:
      type: object
      description: audit_logs 一行的精简视图，列表接口返回。
      required:
      - id
      - ts
      - tenant_id
      - action
      - outcome
      - actor_id
      - actor_type
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time
        request_id:
          type: string
        tenant_id:
          type: string
        actor_id:
          type: string
        actor_type:
          type: string
        app_key:
          type: string
        workspace_id:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        outcome:
          type: string
        error_code:
          type: string
        http_status:
          type: integer
        ip:
          type: string
        user_agent:
          type: string
    AuditLogDetail:
      type: object
      description: 单条审计日志详情，含脱敏后的 before / after / metadata JSON。
      required:
      - id
      - ts
      - tenant_id
      - action
      - outcome
      - actor_id
      - actor_type
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time
        request_id:
          type: string
        tenant_id:
          type: string
        actor_id:
          type: string
        actor_type:
          type: string
        app_key:
          type: string
        workspace_id:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        outcome:
          type: string
        error_code:
          type: string
        http_status:
          type: integer
        ip:
          type: string
        user_agent:
          type: string
        before:
          type: object
          nullable: true
          additionalProperties: true
        after:
          type: object
          nullable: true
          additionalProperties: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
    AuditLogList:
      type: object
      required:
      - records
      - total
      - current
      - size
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogItem'
        total:
          type: integer
          format: int64
        current:
          type: integer
        size:
          type: integer
    TelemetryLogRecord:
      type: object
      description: telemetry_logs 一行的精简视图（列表）。
      required:
      - id
      - ts
      - tenant_id
      - level
      - event
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time
        request_id:
          type: string
        session_id:
          type: string
        tenant_id:
          type: string
        actor_id:
          type: string
        app_key:
          type: string
        level:
          type: string
        event:
          type: string
        message:
          type: string
        url:
          type: string
        user_agent:
          type: string
        ip:
          type: string
        release:
          type: string
    TelemetryLogDetail:
      type: object
      description: 单条遥测日志详情，含完整 payload（前端原始上下文 + error 快照）。
      required:
      - id
      - ts
      - tenant_id
      - level
      - event
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time
        request_id:
          type: string
        session_id:
          type: string
        tenant_id:
          type: string
        actor_id:
          type: string
        app_key:
          type: string
        level:
          type: string
        event:
          type: string
        message:
          type: string
        url:
          type: string
        user_agent:
          type: string
        ip:
          type: string
        release:
          type: string
        payload:
          type: object
          nullable: true
          additionalProperties: true
    TelemetryLogList:
      type: object
      required:
      - records
      - total
      - current
      - size
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/TelemetryLogRecord'
        total:
          type: integer
          format: int64
        current:
          type: integer
        size:
          type: integer
    AuditLogStatsBucket:
      type: object
      description: 一行聚合桶。bucket 是维度值（action 字符串 / outcome 字符串 / ISO8601 小时时间戳）。
      required:
      - bucket
      - count
      properties:
        bucket:
          type: string
        count:
          type: integer
          format: int64
    AuditLogStats:
      type: object
      description: audit_logs 聚合统计结果。空区间 buckets 为空数组。
      required:
      - group_by
      - buckets
      properties:
        group_by:
          type: string
          enum: [action, outcome, hour]
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogStatsBucket'
    ObservabilityTraceBundle:
      type: object
      description: |-
        以 request_id 作为聚合 key，把同一次请求里产生的所有 audit_logs 与
        telemetry_logs 折叠返回。两边都按 ts 升序排列；调用方按时间线渲染。
      required:
      - request_id
      - audit_logs
      - telemetry_logs
      properties:
        request_id:
          type: string
        audit_logs:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogItem'
        telemetry_logs:
          type: array
          items:
            $ref: '#/components/schemas/TelemetryLogRecord'
