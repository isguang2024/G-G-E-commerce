  /site-configs/sets/{id}/items:
    put:
      operationId: updateSiteConfigSetItems
      summary: 整体替换参数集合包含的 config_key 列表
      tags: [siteconfig]
      x-permission-key: system.site_config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
