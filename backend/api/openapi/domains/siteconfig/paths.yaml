paths:
  /site-configs/resolve:
    get:
      operationId: resolveSiteConfigs
      summary: 批量解析参数
      tags: [siteconfig]
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: authenticated
      parameters:
        - name: scope_type
          in: query
          description: 解析作用域；`context` 使用当前请求上下文 APP，`global` 只取全局参数，`app` 读取指定 APP 作用域
          schema:
            type: string
            enum: [context, global, app]
        - name: scope_key
          in: query
          description: 作用域 key；当 `scope_type=app` 时填写目标 APP key
          schema: {type: string}
        - name: keys
          in: query
          description: 逗号分隔的 config_key 列表
          schema: {type: string}
        - name: set_codes
          in: query
          description: 逗号分隔的集合编码列表；集合内的 key 会自动展开到查询
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/SiteConfigResolveResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
  /site-configs/lookup:
    get:
      operationId: lookupSiteConfig
      summary: 查询单个参数
      tags: [siteconfig]
      x-tenant-scoped: true
      x-app-scope: optional
      x-access-mode: authenticated
      parameters:
        - name: config_key
          in: query
          required: true
          description: 参数 key
          schema: {type: string}
        - name: scope_type
          in: query
          description: 查询作用域；`context` 使用当前请求上下文 APP，`global` 只取全局参数，`app` 读取指定 APP 作用域
          schema:
            type: string
            enum: [context, global, app]
        - name: scope_key
          in: query
          description: 作用域 key；当 `scope_type=app` 时填写目标 APP key
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/SiteConfigLookupResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
  /site-configs:
    get:
      operationId: listSiteConfigs
      summary: 查询参数项（管理端）
      tags: [siteconfig]
      x-permission-key: system.site_config.view
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: scope_type
          in: query
          description: 管理端查询范围；`global` 仅返回全局参数，`app` 返回指定 APP 作用域参数，`all` 返回全部作用域
          schema:
            type: string
            enum: [all, global, app]
        - name: scope_key
          in: query
          description: 作用域 key；当 `scope_type=app` 时填写目标 APP key
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/SiteConfigListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
    post:
      operationId: upsertSiteConfig
      summary: 新增或更新参数项
      tags: [siteconfig]
      x-permission-key: system.site_config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/SiteConfigSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/SiteConfigSummary'
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
  /site-configs/{id}:
    put:
      operationId: updateSiteConfig
      summary: 更新参数项
      tags: [siteconfig]
      x-permission-key: system.site_config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/SiteConfigSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/SiteConfigSummary'
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
    delete:
      operationId: deleteSiteConfig
      summary: 删除参数项
      tags: [siteconfig]
      x-permission-key: system.site_config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
