components:
  schemas:
    SiteConfigResolvedItem:
      type: object
      required: [value, source, value_type, sets]
      properties:
        value:
          type: object
          description: 配置值（JSON 对象；不同 value_type 约定不同字段，如 string/number/bool 用 value，image 用 url）
          additionalProperties: true
        source:
          type: string
          enum: [app, global, default]
          description: 值的来源
        value_type:
          type: string
          enum: [string, number, bool, image, json, svg]
        sets:
          type: array
          description: 该 key 所属的集合编码列表
          items: {type: string}
    SiteConfigResolveResponse:
      type: object
      required: [items, version, scope_type, scope_key]
      properties:
        items:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SiteConfigResolvedItem'
        scope_type:
          type: string
          enum: [global, app]
          description: 当前解析生效的作用域类型
        scope_key:
          type: string
          description: 当前解析生效的作用域 key；全局时为空，APP 时为目标 APP key
        version:
          type: string
          description: 请求指纹，用于前端缓存命中校验
    SiteConfigLookupResponse:
      type: object
      required: [config_key, item, scope_type, scope_key]
      properties:
        config_key: {type: string}
        item:
          $ref: '#/components/schemas/SiteConfigResolvedItem'
        scope_type:
          type: string
          enum: [global, app]
          description: 当前解析生效的作用域类型
        scope_key:
          type: string
          description: 当前解析生效的作用域 key；全局时为空，APP 时为目标 APP key
    SiteConfigSummary:
      type: object
      required: [id, tenant_id, scope_type, scope_key, config_key, value_type, fallback_policy, status]
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string}
        scope_type:
          type: string
          enum: [global, app]
          description: 参数所属作用域类型
        scope_key:
          type: string
          description: 参数所属作用域 key；全局时为空，APP 时为目标 APP key
        config_key: {type: string}
        config_value:
          type: object
          additionalProperties: true
        value_type:
          type: string
          enum: [string, number, bool, image, json, svg]
        fallback_policy:
          type: string
          enum: [inherit, strict]
          description: 参数回退策略；inherit 表示当前作用域未命中时允许回退到全局默认，strict 表示不回退
        label: {type: string}
        description: {type: string}
        sort_order: {type: integer}
        is_builtin: {type: boolean}
        status: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    SiteConfigListResponse:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/SiteConfigSummary'}
        total: {type: integer}
    SiteConfigSaveRequest:
      type: object
      required: [scope_type, config_key]
      properties:
        scope_type:
          type: string
          enum: [global, app]
          description: 参数要写入的作用域类型
        scope_key:
          type: string
          description: 作用域 key；当 `scope_type=app` 时填写目标 APP key
        config_key: {type: string, maxLength: 150}
        config_value:
          type: object
          additionalProperties: true
        value_type:
          type: string
          enum: [string, number, bool, image, json, svg]
        fallback_policy:
          type: string
          enum: [inherit, strict]
          description: 参数回退策略；未填写时默认 inherit。APP 作用域参数会强制按 inherit 处理。
        label: {type: string, maxLength: 200}
        description: {type: string, maxLength: 500}
        sort_order: {type: integer}
        status: {type: string, enum: [normal, suspended]}
    SiteConfigSetSummary:
      type: object
      required: [id, set_code, set_name, status, config_keys]
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string}
        set_code: {type: string}
        set_name: {type: string}
        description: {type: string}
        sort_order: {type: integer}
        is_builtin: {type: boolean}
        status: {type: string}
        config_keys:
          type: array
          items: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    SiteConfigSetListResponse:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/SiteConfigSetSummary'}
        total: {type: integer}
    SiteConfigSetSaveRequest:
      type: object
      required: [set_code, set_name]
      properties:
        set_code: {type: string, maxLength: 100}
        set_name: {type: string, maxLength: 200}
        description: {type: string, maxLength: 500}
        sort_order: {type: integer}
        status: {type: string, enum: [normal, suspended]}
    SiteConfigSetItemsRequest:
      type: object
      required: [config_keys]
      properties:
        config_keys:
          type: array
          items: {type: string}
