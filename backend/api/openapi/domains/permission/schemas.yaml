# domains/permission/schemas.yaml
components:
  schemas:
    PermissionActionAuditSummary:
      type: object
      required:
        - total_count
        - unused_count
        - api_only_count
        - page_only_count
        - package_only_count
        - multi_consumer_count
        - cross_context_mirror_count
        - suspected_duplicate_count
      properties:
        total_count: {type: integer, format: int64}
        unused_count: {type: integer, format: int64}
        api_only_count: {type: integer, format: int64}
        page_only_count: {type: integer, format: int64}
        package_only_count: {type: integer, format: int64}
        multi_consumer_count: {type: integer, format: int64}
        cross_context_mirror_count: {type: integer, format: int64}
        suspected_duplicate_count: {type: integer, format: int64}
    PermissionGroupItem:
      type: object
      required: [id, group_type, code, name, status, sort_order, is_builtin, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        group_type: {type: string}
        code: {type: string}
        name: {type: string}
        name_en: {type: string}
        description: {type: string}
        status: {type: string}
        sort_order: {type: integer, format: int64}
        is_builtin: {type: boolean}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    PermissionActionItem:
      type: object
      required:
        - id
        - resource_code
        - action_code
        - module_code
        - permission_key
        - feature_kind
        - data_policy
        - name
        - data_permission_code
        - data_permission_name
        - api_count
        - page_count
        - package_count
        - consumer_types
        - usage_pattern
        - usage_note
        - duplicate_pattern
        - duplicate_group
        - duplicate_keys
        - duplicate_note
        - status
        - sort_order
        - is_builtin
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        resource_code: {type: string}
        action_code: {type: string}
        module_code: {type: string}
        module_group_id: {type: string, format: uuid, nullable: true}
        feature_group_id: {type: string, format: uuid, nullable: true}
        permission_key: {type: string}
        feature_kind: {type: string}
        data_policy: {type: string}
        name: {type: string}
        description: {type: string}
        data_permission_code: {type: string}
        data_permission_name: {type: string}
        api_count: {type: integer, format: int64}
        page_count: {type: integer, format: int64}
        package_count: {type: integer, format: int64}
        consumer_types:
          type: array
          items: {type: string}
        usage_pattern: {type: string}
        usage_note: {type: string}
        duplicate_pattern: {type: string}
        duplicate_group: {type: string}
        duplicate_keys:
          type: array
          items: {type: string}
        duplicate_note: {type: string}
        status: {type: string}
        sort_order: {type: integer, format: int64}
        is_builtin: {type: boolean}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    PermissionActionList:
      type: object
      required: [records, total, current, size, audit_summary]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/PermissionActionItem'}
        total: {type: integer, format: int64}
        current: {type: integer}
        size: {type: integer}
        audit_summary:
          $ref: '#/components/schemas/PermissionActionAuditSummary'
    PermissionActionOptions:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/PermissionActionItem'}
        total: {type: integer, format: int64}
    PermissionActionConsumerAPIItem:
      type: object
      required: [code, method, path, summary]
      properties:
        code: {type: string}
        method: {type: string}
        path: {type: string}
        summary: {type: string}
    PermissionActionConsumerPageItem:
      type: object
      required: [page_key, name, route_path, access_mode]
      properties:
        page_key: {type: string}
        name: {type: string}
        route_path: {type: string}
        access_mode: {type: string}
    PermissionActionConsumerPackageItem:
      type: object
      required: [id, package_key, name, package_type, context_type]
      properties:
        id: {type: string, format: uuid}
        package_key: {type: string}
        name: {type: string}
        package_type: {type: string}
        context_type: {type: string}
    PermissionActionConsumerRoleItem:
      type: object
      required: [id, code, name, context_type]
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        context_type: {type: string}
    PermissionActionConsumersResponse:
      type: object
      required: [permission_key, apis, pages, feature_packages, roles]
      properties:
        permission_key: {type: string}
        apis:
          type: array
          items: {$ref: '#/components/schemas/PermissionActionConsumerAPIItem'}
        pages:
          type: array
          items: {$ref: '#/components/schemas/PermissionActionConsumerPageItem'}
        feature_packages:
          type: array
          items: {$ref: '#/components/schemas/PermissionActionConsumerPackageItem'}
        roles:
          type: array
          items: {$ref: '#/components/schemas/PermissionActionConsumerRoleItem'}
    PermissionActionImpactPreview:
      type: object
      required:
        - permission_key
        - api_count
        - page_count
        - package_count
        - role_count
        - collaboration_workspace_count
        - user_count
      properties:
        permission_key: {type: string}
        api_count: {type: integer, format: int64}
        page_count: {type: integer, format: int64}
        package_count: {type: integer, format: int64}
        role_count: {type: integer, format: int64}
        collaboration_workspace_count: {type: integer, format: int64}
        user_count: {type: integer, format: int64}
    PermissionActionGroupList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/PermissionGroupItem'}
        total: {type: integer, format: int64}
    PermissionActionBatchTemplateItem:
      type: object
      required: [id, name, description, payload, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        payload:
          $ref: '#/components/schemas/PermissionActionBatchTemplatePayload'
        created_by: {type: string, format: uuid, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    PermissionActionBatchTemplateList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/PermissionActionBatchTemplateItem'}
        total: {type: integer, format: int64}
    PermissionActionBatchTemplateSaveRequest:
      type: object
      required: [name]
      properties:
        name: {type: string}
        description: {type: string}
        payload:
          $ref: '#/components/schemas/PermissionActionBatchTemplatePayload'
    PermissionActionBatchTemplatePayload:
      type: object
      additionalProperties: false
      properties:
        ids:
          type: array
          items: {type: string, format: uuid}
        status: {type: string}
        module_group_id: {type: string, format: uuid}
        feature_group_id: {type: string, format: uuid}
        template_name: {type: string}
    PermissionActionCleanupResult:
      type: object
      required: [deleted_count, deleted_keys]
      properties:
        deleted_count: {type: integer, format: int64}
        deleted_keys:
          type: array
          items: {type: string}
    PermissionActionEndpointList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/PermissionActionEndpointListItem'}
        total:
          type: integer
          format: int64
    PermissionActionEndpointListItem:
      type: object
      required: [id, code, method, path, handler, summary, access_mode, permission_keys]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        method:
          type: string
        path:
          type: string
        handler:
          type: string
        summary:
          type: string
        access_mode:
          type: string
        permission_key:
          type: string
        permission_keys:
          type: array
          items:
            type: string
        permission_contexts:
          type: array
          items:
            type: string
        permission_binding_mode:
          type: string
        shared_across_contexts:
          type: boolean
        permission_note:
          type: string
        auth_mode:
          type: string
        category_id:
          type: string
          format: uuid
        category:
          $ref: '#/components/schemas/PermissionActionEndpointCategorySummary'
    PermissionActionEndpointCategorySummary:
      type: object
      additionalProperties: false
      required: [id, code, name, sort_order, status]
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        name_en: {type: string}
        sort_order: {type: integer}
        status: {type: string}
    PermissionActionGroupSaveRequest:
      type: object
      required:
      - code
      - name
      - group_type
      properties:
        code:
          type: string
        name:
          type: string
        name_en:
          type: string
        description:
          type: string
        group_type:
          type: string
        status:
          type: string
        sort_order:
          type: integer
    PermissionActionEndpointAddRequest:
      type: object
      required:
      - endpoint_code
      properties:
        endpoint_code:
          type: string
    PermissionActionBatchUpdateResult:
      type: object
      required: [updated_count, skipped_ids]
      properties:
        updated_count: {type: integer, format: int64}
        skipped_ids:
          type: array
          items: {type: string}
    RiskAuditItem:
      type: object
      required:
        - id
        - object_type
        - object_id
        - operation_type
        - before_summary
        - after_summary
        - impact_summary
        - request_id
        - created_at
      properties:
        id: {type: string, format: uuid}
        operator_id: {type: string, format: uuid, nullable: true}
        object_type: {type: string}
        object_id: {type: string}
        operation_type: {type: string}
        before_summary:
          $ref: '#/components/schemas/RiskAuditSummary'
        after_summary:
          $ref: '#/components/schemas/RiskAuditSummary'
        impact_summary:
          $ref: '#/components/schemas/RiskAuditSummary'
        request_id: {type: string}
        created_at: {type: string, format: date-time}
    RiskAuditSummary:
      type: object
      additionalProperties: false
      properties:
        permission_key: {type: string}
        status: {type: string}
        context_type: {type: string}
        module_code: {type: string}
        feature_kind: {type: string}
        module_group_id: {type: string, format: uuid}
        feature_group_id: {type: string, format: uuid}
        template_name: {type: string}
        package_count: {type: integer}
        collaboration_workspace_count: {type: integer}
    PermissionActionRiskAuditList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/RiskAuditItem'}
        total: {type: integer, format: int64}
