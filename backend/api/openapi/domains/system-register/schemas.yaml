components:
  schemas:
    RegisterEntryItem:
      type: object
      required: [id, app_key, entry_code, name, login_page_key, status, allow_public_register, require_invite, require_email_verify, require_captcha, auto_login, is_system_reserved]
      properties:
        id: {type: string, format: uuid}
        app_key: {type: string}
        entry_code: {type: string}
        name: {type: string}
        host: {type: string}
        path_prefix: {type: string}
        register_source: {type: string}
        login_page_key: {type: string}
        status: {type: string}
        allow_public_register: {type: boolean}
        require_invite: {type: boolean}
        require_email_verify: {type: boolean}
        require_captcha: {type: boolean}
        auto_login: {type: boolean}
        is_system_reserved: {type: boolean}
        target_url: {type: string}
        target_app_key: {type: string}
        target_navigation_space_key: {type: string}
        target_home_path: {type: string}
        captcha_provider: {type: string}
        captcha_site_key: {type: string}
        description: {type: string}
        role_codes:
          type: array
          items: {type: string}
        feature_package_keys:
          type: array
          items: {type: string}
        sort_order: {type: integer}
        remark: {type: string}
    RegisterEntryList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/RegisterEntryItem'}
        total: {type: integer}
    RegisterEntryUpsertRequest:
      type: object
      required: [app_key, entry_code, name]
      properties:
        app_key: {type: string}
        entry_code: {type: string}
        name: {type: string}
        host: {type: string}
        path_prefix: {type: string}
        register_source: {type: string}
        login_page_key: {type: string}
        status: {type: string}
        allow_public_register: {type: boolean}
        require_invite: {type: boolean}
        require_email_verify: {type: boolean}
        require_captcha: {type: boolean}
        auto_login: {type: boolean}
        is_system_reserved: {type: boolean}
        target_url: {type: string}
        target_app_key: {type: string}
        target_navigation_space_key: {type: string}
        target_home_path: {type: string}
        captcha_provider: {type: string}
        captcha_site_key: {type: string}
        description: {type: string}
        role_codes:
          type: array
          items: {type: string}
        feature_package_keys:
          type: array
          items: {type: string}
        sort_order: {type: integer}
        remark: {type: string}
    LoginPageTemplateItem:
      type: object
      required: [id, tenant_id, template_key, name, scene, app_scope, status, is_default, config, meta]
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string}
        template_key: {type: string}
        name: {type: string}
        scene: {type: string}
        app_scope: {type: string}
        status: {type: string}
        is_default: {type: boolean}
        config:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    LoginPageTemplateList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/LoginPageTemplateItem'}
        total: {type: integer}
    LoginPageTemplateUpsertRequest:
      type: object
      required: [template_key, name]
      properties:
        tenant_id: {type: string}
        template_key: {type: string}
        name: {type: string}
        scene: {type: string}
        app_scope: {type: string}
        status: {type: string}
        is_default: {type: boolean}
        config:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
    RegisterLogItem:
      type: object
      required: [user_id, username, register_source, register_entry_code, created_at]
      properties:
        user_id: {type: string, format: uuid}
        username: {type: string}
        email: {type: string}
        register_app_key: {type: string}
        register_entry_code: {type: string}
        register_source: {type: string}
        register_ip: {type: string}
        register_user_agent: {type: string}
        agreement_version: {type: string}
        created_at: {type: string, format: date-time}
        policy_snapshot:
          type: object
          nullable: true
          additionalProperties: {}
          description: 注册时刻冻结的有效策略快照（含布尔开关、角色 codes、功能包 keys）
    RegisterLogList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/RegisterLogItem'}
        total: {type: integer}
