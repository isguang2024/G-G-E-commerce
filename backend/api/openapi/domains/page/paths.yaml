  /pages/access-trace:
    get:
      operationId: getPageAccessTrace
      summary: 获取页面访问链路
      tags:
      - page
      x-permission-key: system.page.manage
      x-access-mode: permission
      parameters:
      - name: app_key
        in: query
        required: true
        schema:
          type: string
      - name: user_id
        in: query
        required: true
        description: 被测用户 ID (UUID)
        schema:
          type: string
          format: uuid
      - name: collaboration_workspace_id
        in: query
        description: 协作空间 ID；为空表示个人空间链路
        schema:
          type: string
          format: uuid
      - name: space_key
        in: query
        description: 菜单空间 key；为空自动解析默认空间
        schema:
          type: string
      - name: page_key
        in: query
        description: 单个页面 key，留空则返回运行时可见全部页面
        schema:
          type: string
      - name: page_keys
        in: query
        description: 多页面 key 逗号分隔
        schema:
          type: string
      - name: route_path
        in: query
        description: 通过路由路径反查 page_key
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/PageAccessTraceResponse'
