# domains/auth/schemas.yaml
# Domain-specific schemas (currently kept in components/common.yaml).
# Move schemas here incrementally when they belong exclusively to this domain.
components:
  schemas:
    AuthCallbackPayload:
      type: object
      required:
        - mode
        - code
        - state
        - target_app_key
        - redirect_uri
        - redirect_to
      properties:
        mode:
          type: string
          enum: [token_exchange]
        code:
          type: string
        state:
          type: string
        target_app_key:
          type: string
        redirect_uri:
          type: string
        redirect_to:
          type: string
        target_path:
          type: string
        navigation_space_key:
          type: string
        auth_protocol_version:
          type: string
    AuthCallbackExchangeRequest:
      type: object
      required:
        - code
        - state
        - nonce
        - target_app_key
        - redirect_uri
      properties:
        code:
          type: string
        state:
          type: string
        nonce:
          type: string
        target_app_key:
          type: string
        redirect_uri:
          type: string
        auth_protocol_version:
          type: string
    RegisterContext:
      type: object
      required:
        - entry_code
        - entry_app_key
        - policy_code
        - target_app_key
        - target_navigation_space_key
        - target_home_path
        - allow_public_register
        - require_invite
        - require_email_verify
        - require_captcha
        - auto_login
      properties:
        entry_code: {type: string}
        entry_name: {type: string}
        entry_app_key: {type: string}
        register_source: {type: string}
        policy_code: {type: string}
        target_app_key: {type: string}
        target_navigation_space_key: {type: string}
        target_home_path: {type: string}
        default_workspace_type: {type: string}
        allow_public_register: {type: boolean}
        require_invite: {type: boolean}
        require_email_verify: {type: boolean}
        require_captcha: {type: boolean}
        auto_login: {type: boolean}
        agreement_version: {type: string}
        captcha_provider:
          type: string
          description: 人机验证提供商：none | recaptcha | hcaptcha | turnstile
        captcha_site_key:
          type: string
          description: 对应提供商的公开 site_key，前端渲染 captcha widget 使用
