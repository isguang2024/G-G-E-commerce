# domains/auth/schemas.yaml
# Domain-specific schemas (currently kept in components/common.yaml).
# Move schemas here incrementally when they belong exclusively to this domain.
components:
  schemas:
    AuthCallbackPayload:
      type: object
      required:
        - mode
        - code
        - state
        - target_app_key
        - redirect_uri
        - redirect_to
      properties:
        mode:
          type: string
          enum: [token_exchange]
        code:
          type: string
        state:
          type: string
        target_app_key:
          type: string
        redirect_uri:
          type: string
        redirect_to:
          type: string
        target_path:
          type: string
        navigation_space_key:
          type: string
        auth_protocol_version:
          type: string
    AuthCallbackExchangeRequest:
      type: object
      required:
        - code
        - state
        - nonce
        - target_app_key
        - redirect_uri
      properties:
        code:
          type: string
        state:
          type: string
        nonce:
          type: string
        target_app_key:
          type: string
        redirect_uri:
          type: string
        auth_protocol_version:
          type: string
    SilentSSORequest:
      type: object
      required:
        - target_app_key
        - redirect_uri
        - state
        - nonce
      properties:
        target_app_key:
          type: string
          description: 目标业务 APP key
        redirect_uri:
          type: string
          description: callback 回跳绝对地址
        state:
          type: string
          description: CSRF state token
        nonce:
          type: string
          description: 防重放 nonce
        max_age:
          type: integer
          description: "最大认证年龄(秒): 0=必须重新认证"
        target_path:
          type: string
          description: 登录成功后最终业务页路径
        navigation_space_key:
          type: string
          description: 期望进入的菜单空间
    RegisterContext:
      type: object
      required:
        - entry_code
        - entry_app_key
        - login_page_key
        - allow_public_register
        - require_invite
        - require_email_verify
        - require_captcha
        - auto_login
        - is_system_reserved
      properties:
        entry_code: {type: string}
        entry_name: {type: string}
        entry_app_key: {type: string}
        login_page_key: {type: string}
        register_source: {type: string}
        is_system_reserved: {type: boolean}
        target_url: {type: string}
        target_app_key: {type: string}
        target_navigation_space_key: {type: string}
        target_home_path: {type: string}
        allow_public_register: {type: boolean}
        require_invite: {type: boolean}
        require_email_verify: {type: boolean}
        require_captcha: {type: boolean}
        auto_login: {type: boolean}
        agreement_version: {type: string}
        captcha_provider:
          type: string
          description: 人机验证提供商：none | recaptcha | hcaptcha | turnstile
        captcha_site_key:
          type: string
          description: 对应提供商的公开 site_key，前端渲染 captcha widget 使用
        role_codes:
          type: array
          items: {type: string}
          description: 注册时自动绑定的角色 codes
        feature_package_keys:
          type: array
          items: {type: string}
          description: 注册时自动绑定的功能包 keys
    LoginPageContext:
      type: object
      required:
        - app_key
        - login_page_key
        - login_ui_mode
        - sso_mode
        - resolved_by
        - page_scene
        - target_app_key
        - register_path
        - register_app_key
      properties:
        app_key: {type: string}
        login_page_key: {type: string}
        login_ui_mode: {type: string}
        sso_mode: {type: string}
        resolved_by: {type: string}
        page_scene: {type: string}
        target_app_key: {type: string}
        entry_code: {type: string}
        entry_name: {type: string}
        register_path: {type: string}
        register_app_key: {type: string}
        template_name:
          type: string
          description: 登录页模板显示名称
        template_config:
          type: object
          additionalProperties: true
          description: 模板配置(theme/features/pages/social 四大块，其中 pages 支持页面级 theme/texts 覆盖)
