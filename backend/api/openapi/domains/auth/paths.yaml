# domains/auth/paths.yaml — AUTO-SPLIT by split_spec.py
paths:
  /auth/login:
    post:
      operationId: login
      summary: 用户登录
      tags:
      - auth
      x-access-mode: public
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/common.yaml#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/register:
    post:
      operationId: register
      summary: 用户注册
      tags:
      - auth
      x-access-mode: public
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/common.yaml#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/register-context:
    get:
      operationId: getRegisterContext
      summary: 获取注册上下文（命中入口 + 有效策略合并结果）
      tags:
      - auth
      x-access-mode: public
      security: []
      parameters:
        - in: query
          name: host
          required: false
          schema: {type: string}
        - in: query
          name: path
          required: false
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../domains/auth/schemas.yaml#/components/schemas/RegisterContext'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/login-page-context:
    get:
      operationId: getLoginPageContext
      summary: 获取登录页模板上下文（登录/找回密码公共入口）
      tags:
      - auth
      x-access-mode: public
      security: []
      parameters:
        - in: query
          name: host
          required: false
          schema: {type: string}
        - in: query
          name: path
          required: false
          schema: {type: string}
        - in: query
          name: target_app_key
          required: false
          schema: {type: string}
        - in: query
          name: login_page_key
          required: false
          schema: {type: string}
        - in: query
          name: page_scene
          required: false
          schema:
            type: string
            enum: [login, register, forget_password]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../domains/auth/schemas.yaml#/components/schemas/LoginPageContext'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/refresh:
    post:
      operationId: refreshToken
      summary: 刷新访问令牌
      tags:
      - auth
      x-access-mode: public
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/common.yaml#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/logout:
    post:
      operationId: logout
      summary: 退出登录
      tags:
      - auth
      x-access-mode: authenticated
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/MutationResult'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/callback/exchange:
    post:
      operationId: exchangeAuthCallback
      summary: centralized_login 回调换取令牌
      tags:
      - auth
      x-access-mode: public
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../domains/auth/schemas.yaml#/components/schemas/AuthCallbackExchangeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/callback/silent:
    post:
      operationId: silentSSOCallback
      summary: 静默 SSO — 中心会话有效时自动签发 callback code
      tags:
      - auth
      x-access-mode: authenticated
      x-tenant-scoped: true
      x-app-scope: none
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../domains/auth/schemas.yaml#/components/schemas/SilentSSORequest'
      responses:
        '200':
          description: SSO 成功，已签发 callback
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/LoginResponse'
        '401':
          description: 中心会话无效或不满足 max_age 要求
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/social/exchange:
    post:
      operationId: exchangeSocialToken
      summary: 兑换社交登录 token（登录或注册绑定上下文）
      tags:
      - auth
      x-access-mode: public
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/common.yaml#/components/schemas/SocialTokenExchangeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/SocialTokenExchangeResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
  /auth/me:
    get:
      operationId: getAuthMe
      summary: 获取当前登录账户信息
      tags:
      - auth
      x-access-mode: authenticated
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/AuthMe'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/Error'
