# domains/api_endpoint/schemas.yaml
components:
  schemas:
    ApiEndpointCategoryItem:
      type: object
      required: [id, code, name, name_en, sort_order, status]
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        name_en: {type: string}
        sort_order: {type: integer}
        status: {type: string}
    ApiEndpointItem:
      type: object
      required:
        - id
        - code
        - method
        - path
        - spec
        - handler
        - summary
        - permission_keys
        - auth_mode
        - category_id
        - status
        - runtime_exists
        - stale
        - stale_reason
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        method: {type: string}
        path: {type: string}
        spec: {type: string}
        handler: {type: string}
        summary: {type: string}
        permission_keys:
          type: array
          items: {type: string}
        auth_mode: {type: string}
        category_id: {type: string}
        category:
          type: object
          allOf:
            - $ref: '#/components/schemas/ApiEndpointCategoryItem'
          nullable: true
        status: {type: string}
        runtime_exists: {type: boolean}
        stale: {type: boolean}
        stale_reason: {type: string}
        created_at: {type: string}
        updated_at: {type: string}
    ApiEndpointList:
      type: object
      required: [records, total, current, size]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/ApiEndpointItem'}
        total: {type: integer, format: int64}
        current: {type: integer}
        size: {type: integer}
    StaleApiEndpointList:
      type: object
      required: [records, total, current, size]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/ApiEndpointItem'}
        total: {type: integer, format: int64}
        current: {type: integer}
        size: {type: integer}
    UnregisteredApiEndpointMeta:
      type: object
      properties:
        summary: {type: string}
        category_code: {type: string}
        permission_keys:
          type: array
          items: {type: string}
      additionalProperties: true
    UnregisteredApiEndpointItem:
      type: object
      required: [method, path, spec, handler, has_meta, meta]
      properties:
        method: {type: string}
        path: {type: string}
        spec: {type: string}
        handler: {type: string}
        has_meta: {type: boolean}
        meta:
          $ref: '#/components/schemas/UnregisteredApiEndpointMeta'
    UnregisteredApiEndpointList:
      type: object
      required: [records, total, current, size]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/UnregisteredApiEndpointItem'}
        total: {type: integer, format: int64}
        current: {type: integer}
        size: {type: integer}
    ApiEndpointCategoryList:
      type: object
      required: [records, total]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/ApiEndpointCategoryItem'}
        total: {type: integer, format: int64}
    ApiEndpointSaveRequest:
      type: object
      required: [code, method, path, summary, status, handler, permission_keys]
      properties:
        code: {type: string}
        method: {type: string}
        path: {type: string}
        summary: {type: string}
        category_id: {type: string, nullable: true}
        status: {type: string}
        handler: {type: string}
        permission_keys:
          type: array
          items: {type: string}
    ApiEndpointCategorySaveRequest:
      type: object
      required: [code, name, name_en, sort_order, status]
      properties:
        code: {type: string}
        name: {type: string}
        name_en: {type: string}
        sort_order: {type: integer}
        status: {type: string}
    ApiEndpointOverview:
      type: object
      required:
        - total_count
        - uncategorized_count
        - stale_count
        - no_permission_count
        - shared_permission_count
        - cross_context_shared_count
        - category_counts
      properties:
        total_count: {type: integer, format: int64}
        uncategorized_count: {type: integer, format: int64}
        stale_count: {type: integer, format: int64}
        no_permission_count: {type: integer, format: int64}
        shared_permission_count: {type: integer, format: int64}
        cross_context_shared_count: {type: integer, format: int64}
        category_counts:
          type: array
          items:
            type: object
            required: [category_id, count]
            properties:
              category_id: {type: string}
              count: {type: integer, format: int64}
    CleanupStaleRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: {type: string, format: uuid}
    CleanupStaleResult:
      type: object
      required: [deleted_count]
      properties:
        deleted_count: {type: integer, format: int64}
    SyncApiEndpointsResult:
      type: object
      required: [processed, created, updated, total_count]
      properties:
        processed: {type: integer, format: int64}
        created: {type: integer, format: int64}
        updated: {type: integer, format: int64}
        total_count: {type: integer, format: int64}
