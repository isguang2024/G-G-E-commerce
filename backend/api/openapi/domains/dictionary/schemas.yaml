components:
  schemas:
    DictTypeSummary:
      type: object
      required: [id, code, name, status, is_builtin, item_count]
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        description: {type: string}
        status: {type: string}
        is_builtin: {type: boolean}
        item_count: {type: integer}
        sort_order: {type: integer}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    DictTypeListResponse:
      type: object
      required: [records, total, current, size]
      properties:
        records:
          type: array
          items: {$ref: '#/components/schemas/DictTypeSummary'}
        total: {type: integer}
        current: {type: integer}
        size: {type: integer}
    DictTypeSaveRequest:
      type: object
      required: [code, name]
      properties:
        code: {type: string, maxLength: 100}
        name: {type: string, maxLength: 200}
        description: {type: string, maxLength: 500}
        status: {type: string, enum: [normal, suspended]}
        sort_order: {type: integer}
    DictItemSummary:
      type: object
      required: [id, label, value, status]
      properties:
        id: {type: string, format: uuid}
        label: {type: string}
        value: {type: string}
        extra: {type: object}
        is_default: {type: boolean}
        status: {type: string}
        sort_order: {type: integer}
    DictTypeDetail:
      type: object
      required: [id, code, name, status, is_builtin, item_count, items]
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        description: {type: string}
        status: {type: string}
        is_builtin: {type: boolean}
        item_count: {type: integer}
        sort_order: {type: integer}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        items:
          type: array
          items: {$ref: '#/components/schemas/DictItemSummary'}
    DictItemSaveRequest:
      type: object
      required: [label, value]
      properties:
        label: {type: string, maxLength: 200}
        value: {type: string, maxLength: 200}
        extra: {type: object}
        is_default: {type: boolean}
        status: {type: string, enum: [normal, suspended]}
        sort_order: {type: integer}
    DictItemsBatchSaveRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/DictItemSaveRequest'}
    DictsByCodesResponse:
      type: object
      additionalProperties:
        type: array
        items: {$ref: '#/components/schemas/DictItemSummary'}
