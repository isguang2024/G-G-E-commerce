paths:
  /dictionaries:
    get:
      operationId: listDictTypes
      summary: 获取字典类型列表
      tags: [dictionary]
      x-permission-key: system.dictionary.view
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: current
          in: query
          schema: {type: integer, default: 1}
        - name: size
          in: query
          schema: {type: integer, default: 20}
        - name: keyword
          in: query
          description: 按 code 或 name 模糊搜索
          schema: {type: string}
        - name: status
          in: query
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/DictTypeListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
    post:
      operationId: createDictType
      summary: 创建字典类型
      tags: [dictionary]
      x-permission-key: system.dictionary.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/DictTypeSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/DictTypeSummary'
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
  /dictionaries/by-codes:
    get:
      operationId: getDictsByCodes
      summary: 按编码批量查询字典项
      tags: [dictionary]
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: authenticated
      parameters:
        - name: codes
          in: query
          required: true
          description: 逗号分隔的字典类型编码
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/DictsByCodesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
  /dictionaries/{id}:
    get:
      operationId: getDictType
      summary: 获取字典类型详情
      tags: [dictionary]
      x-permission-key: system.dictionary.view
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/DictTypeDetail'
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
    put:
      operationId: updateDictType
      summary: 更新字典类型
      tags: [dictionary]
      x-permission-key: system.dictionary.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/DictTypeSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/DictTypeSummary'
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
    delete:
      operationId: deleteDictType
      summary: 删除字典类型
      tags: [dictionary]
      x-permission-key: system.dictionary.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
  /dictionaries/{id}/items:
    get:
      operationId: listDictItems
      summary: 获取字典项列表
      tags: [dictionary]
      x-permission-key: system.dictionary.view
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './schemas.yaml#/components/schemas/DictItemSummary'
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
    post:
      operationId: createDictItem
      summary: 创建单个字典项
      tags: [dictionary]
      x-permission-key: system.dictionary.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/DictItemSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/DictItemSummary'
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
    put:
      operationId: saveDictItems
      summary: 批量保存字典项
      tags: [dictionary]
      x-permission-key: system.dictionary.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/DictItemsBatchSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './schemas.yaml#/components/schemas/DictItemSummary'
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
  /dictionaries/{id}/items/{itemId}:
    put:
      operationId: updateDictItem
      summary: 更新单个字典项
      tags: [dictionary]
      x-permission-key: system.dictionary.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: itemId
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/DictItemSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/DictItemSummary'
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
    delete:
      operationId: deleteDictItem
      summary: 删除单个字典项
      tags: [dictionary]
      x-permission-key: system.dictionary.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: itemId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '400':
          description: Bad Request
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
        '404':
          description: Not Found
          content:
            application/json:
              schema: {$ref: '../../components/common.yaml#/components/schemas/Error'}
