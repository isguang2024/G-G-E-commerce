      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/StorageBucketSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageBucketSummary'
        '400': {$ref: '../../components/errors.yaml#/components/responses/BadRequest'}
  /storage/buckets/{id}:
    get:
      operationId: getStorageBucket
      summary: 查看桶详情
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageBucketSummary'
        '404': {$ref: '../../components/errors.yaml#/components/responses/NotFound'}
    put:
      operationId: updateStorageBucket
      summary: 更新桶
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/StorageBucketSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageBucketSummary'
        '400': {$ref: '../../components/errors.yaml#/components/responses/BadRequest'}
        '404': {$ref: '../../components/errors.yaml#/components/responses/NotFound'}
    delete:
      operationId: deleteStorageBucket
      summary: 删除桶（软删）
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/MutationResult'
        '404': {$ref: '../../components/errors.yaml#/components/responses/NotFound'}

