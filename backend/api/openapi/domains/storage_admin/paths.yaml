# domains/storage_admin/paths.yaml
# 上传配置中心管理面 API：
# - /storage/providers/...  Provider CRUD + 健康检查
# - /storage/buckets/...    Bucket CRUD
# - /upload/keys/...        UploadKey CRUD + 内嵌 rules 子资源
# - /upload/rules/{ruleId}  Rule 单独操作
# 全部 system.upload.config.manage 权限。
paths:
  /storage/providers:
    get:
      operationId: listStorageProviders
      summary: 列出存储 Provider
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [ready, disabled, error]}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageProviderListResponse'
        '401': {$ref: '../../components/errors.yaml#/components/responses/Unauthorized'}
    post:
      operationId: createStorageProvider
      summary: 创建存储 Provider
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/StorageProviderSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageProviderSummary'
        '400': {$ref: '../../components/errors.yaml#/components/responses/BadRequest'}
        '401': {$ref: '../../components/errors.yaml#/components/responses/Unauthorized'}
  /storage/providers/{id}:
    get:
      operationId: getStorageProvider
      summary: 查看 Provider 详情
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageProviderSummary'
        '404': {$ref: '../../components/errors.yaml#/components/responses/NotFound'}
    put:
      operationId: updateStorageProvider
      summary: 更新 Provider
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/StorageProviderSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageProviderSummary'
        '400': {$ref: '../../components/errors.yaml#/components/responses/BadRequest'}
        '404': {$ref: '../../components/errors.yaml#/components/responses/NotFound'}
    delete:
      operationId: deleteStorageProvider
      summary: 删除 Provider（软删）
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../components/common.yaml#/components/schemas/MutationResult'
        '404': {$ref: '../../components/errors.yaml#/components/responses/NotFound'}
  /storage/providers/{id}/test:
    post:
      operationId: testStorageProvider
      summary: 测试 Provider 健康
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageProviderTestResponse'
        '404': {$ref: '../../components/errors.yaml#/components/responses/NotFound'}

  /storage/buckets:
    get:
      operationId: listStorageBuckets
      summary: 列出存储桶
      tags: [storage]
      x-permission-key: system.upload.config.manage
      x-tenant-scoped: true
      x-app-scope: none
      x-access-mode: permission
      parameters:
        - {name: provider_id, in: query, schema: {type: string, format: uuid}}
        - {name: status, in: query, schema: {type: string, enum: [ready, disabled]}}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/StorageBucketListResponse'
        '401': {$ref: '../../components/errors.yaml#/components/responses/Unauthorized'}
    post:
